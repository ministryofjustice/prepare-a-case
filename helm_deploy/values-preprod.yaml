# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

generic-service:
  ingress:
    hosts:
        - prepare-a-case-preprod.apps.live-1.cloud-platform.service.justice.gov.uk

  autoscaling:
    minReplicas: 2
    maxReplicas: 4

  resources:
    limits:
      cpu: 1000m
      memory: 500Mi
    requests:
      cpu: 50m
      memory: 100Mi

  env:
    PAC_ENV: "preprod"
    COURT_CASE_SERVICE_URL: "https://court-case-service-preprod.apps.live-1.cloud-platform.service.justice.gov.uk"
    NOMIS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    USER_PREFERENCE_SERVICE_URL: "https://hmpps-user-preferences-preprod.hmpps.service.justice.gov.uk"
    CASE_SNAPSHOT_TIMES: "00:00,08:45,09:45,10:15,10:45,11:15,11:45,12:15,12:45,13:15,13:45,14:15,14:45,15:15,15:45,16:15,16:45,17:15,17:45"
    ENABLE_MATCHER_LOGGING: "true"
    ENABLE_CLICK_ANALYTICS: "true"
    INGRESS_URL: "https://prepare-a-case-preprod.apps.live-1.cloud-platform.service.justice.gov.uk"

  allowlist:
    moj-official-aws-preprod: "51.149.251.0/24" # this one is not part of a group
    office: "217.33.148.210/32"
    health-kick: "35.177.252.195/32" # todo: can this one be removed?
    mojvpn: "81.134.202.29/32"
    cloudplatform-live1-1: "35.178.209.113/32"
    cloudplatform-live1-2: "3.8.51.207/32"
    cloudplatform-live1-3: "35.177.252.54/32"
    moj-official-tgw-prod: "51.149.250.0/24"
    global-protect-1: "18.130.148.126/32"
    global-protect-3: "35.176.93.186/32"
    global-protect-4: "35.176.148.126/32"
    global-protect-prisma: "128.77.75.64/26"
    petty-france-wifi: "213.121.161.112/28"
    dom1-ark-2: "194.33.192.0/25"
    dom1-ark-4: "194.33.196.0/25"
    # todo: can remove the above use the below after migrating to gha
    # groups:
    #   - moj_cloud_platform
    #   - digital_staff_and_mojo

generic-prometheus-alerts:
  alertSeverity: probation_in_court_alerts_preprod