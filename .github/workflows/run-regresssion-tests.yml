name: Regression Tests

on:
  # Run at 5:45pm UK time, Monday to Friday
  schedule:
    - cron: '45 17 * * 1-5'
      timezone: "Europe/London"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment URL (leave blank to use default)'
        required: false
        type: string

jobs:
  ui-tests:
    name: Run Prepare a Case UI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout UI test repository
        uses: actions/checkout@v4
        with:
          repository: ministryofjustice/hmpps-prepare-a-case-ui-tests
          ref: main

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run UI tests
        env:
          PAC_AUT_URL: ${{ inputs.environment || secrets.PAC_AUT_URL }}
          PAC_USERNAME: ${{ secrets.PAC_USERNAME }}
          PAC_PASSWORD: ${{ secrets.PAC_PASSWORD }}
          PAC_BROWSER_TYPE: "Headless"
          PAC_ENVIRONMENT_TYPE: "local"
          PAC_SELENIUM_GRID: ${{ secrets.PAC_SELENIUM_GRID }}
        run: |
          ./mvnw clean verify -Dcucumber.filter.tags="@test"

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-html-reports/
          retention-days: 30

      - name: Upload Surefire report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-report
          path: target/surefire-reports/
          retention-days: 30
